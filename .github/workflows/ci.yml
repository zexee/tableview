name: CI

on:
  push:
    branches: [master]
    tags: ["v*", "[0-9]*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

env:
  QT_VERSION: "6.8.3"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Resolve Qt prefix
        id: paths
        shell: bash
        run: echo "qt_prefix=${{ github.workspace }}/qt6-static" >> "$GITHUB_OUTPUT"

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            zlib1g-dev \
            libfontconfig1-dev \
            libfreetype-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb1-dev \
            libxcb-cursor-dev \
            libxcb-glx0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-shm0-dev \
            libxcb-sync-dev \
            libxcb-util-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-xkb-dev

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Ninja
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Restore static Qt cache
        id: cache-qt
        uses: actions/cache/restore@v4
        with:
          path: qt6-static
          key: ${{ runner.os }}-qt${{ env.QT_VERSION }}-static-${{ hashFiles('scripts/build-static-qt.sh', 'scripts/build-static-qt.ps1') }}

      - name: Build static Qt (Linux/macOS)
        if: steps.cache-qt.outputs.cache-hit != 'true' && runner.os != 'Windows'
        run: bash scripts/build-static-qt.sh

      - name: Build static Qt (Windows)
        if: steps.cache-qt.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build-static-qt.ps1

      - name: Save static Qt cache
        if: steps.cache-qt.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: qt6-static
          key: ${{ runner.os }}-qt${{ env.QT_VERSION }}-static-${{ hashFiles('scripts/build-static-qt.sh', 'scripts/build-static-qt.ps1') }}

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ steps.paths.outputs.qt_prefix }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        shell: bash
        run: ctest --test-dir build --output-on-failure --no-tests=ignore

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp build/tableview.exe dist/
          else
            cp build/tableview dist/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tableview-${{ runner.os }}
          path: dist/
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package per-platform archives
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            (cd "$dir" && zip -r "../${name}.zip" .)
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
